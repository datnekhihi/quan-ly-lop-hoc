<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Học Sinh - Smart Attendee</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- Đạt nhớ kiểm tra xem file này trên GitHub tên là firebase.config.js hay firebase-config.js nhé -->
    <script src="firebase.config.js"></script>
    <style>
        body { margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
               background: url('https://static.vinwonders.com/2023/02/kinh-thanh-hue-4.jpg') no-repeat center center fixed; background-size: cover; font-family: sans-serif; }
        .glass-card { background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; 
                      color: white; text-align: center; width: 350px; border: 1px solid rgba(255,255,255,0.1); }
        h2#name { color: #55efc4; text-transform: uppercase; margin: 10px 0; }
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-checkin { background: #55efc4; color: #000; }
        .btn-leave { background: #ff7675; color: #fff; }
        .btn-exit { background: #636e72; color: #fff; margin-top: 20px; font-size: 12px; width: auto; padding: 5px 15px; }
        input { width: 90%; padding: 10px; border-radius: 5px; border: none; margin: 5px 0; color: #000; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2 id="name">ĐANG TẢI...</h2>
        <p>Điểm: <span id="score">0</span></p>
        <p>Trạng thái: <span id="status">...</span></p>
        
        <button class="btn-checkin" onclick="checkIn()">BẤM ĐIỂM DANH NHANH</button>
        
        <input type="text" id="reason" placeholder="Lý do xin nghỉ...">
        <button class="btn-leave" onclick="xinNghi()">GỬI ĐƠN XIN NGHỈ</button>

        <button class="btn-exit" onclick="window.location.href='index.html'">THOÁT</button>
    </div>

    <script>
        // CHỈ KHAI BÁO MỘT LẦN DUY NHẤT Ở ĐÂY
        const urlParams = new URLSearchParams(window.location.search);
        const currentID = urlParams.get('id');

        if (!currentID) {
            alert("Lỗi: Không tìm thấy ID học sinh trên link!");
        } else {
            database.ref('users/' + currentID).on('value', (snap) => {
                const data = snap.val();
                if(data) {
                    document.getElementById('name').innerText = data.ten;
                    document.getElementById('score').innerText = data.diem_ren_luyen || 0;
                    document.getElementById('status').innerText = data.trang_thai || "Chưa điểm danh";
                }
            });
        }

        function checkIn() {
            if(!currentID) return alert("Không có ID!");
            const now = new Date();
            let tinhTrang = (now.getHours() >= 7) ? "Trễ" : "Có mặt";

            database.ref('users/' + currentID).update({
                trang_thai: tinhTrang,
                gio_diem_danh: now.toLocaleTimeString('vi-VN', { hour12: false })
            }).then(() => {
                alert("Đã điểm danh: " + tinhTrang);
            });
        }

        function xinNghi() {
            if(!currentID) return;
            const r = document.getElementById('reason').value.trim();
            if(!r) return alert("Nhập lý do!");
            
            database.ref('xin_nghi/' + currentID).set({
                ten: document.getElementById('name').innerText,
                ly_do: r,
                thoi_gian: new Date().toLocaleString()
            }).then(() => {
                database.ref('users/' + currentID).update({ trang_thai: "Xin nghỉ" });
                alert("Đã gửi đơn!");
            });
        }
    </script>
</body>
</html>
