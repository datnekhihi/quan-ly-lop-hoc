<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Học Sinh - Smart Attendee</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase.config.js"></script>
    <style>
        body { margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
               background: url('https://static.vinwonders.com/2023/02/kinh-thanh-hue-4.jpg') no-repeat center center fixed; background-size: cover; font-family: sans-serif; }
        .glass-card { background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; 
                      color: white; text-align: center; width: 350px; border: 1px solid rgba(255,255,255,0.1); }
        h2#name { color: #55efc4; text-transform: uppercase; margin: 10px 0; }
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-checkin { background: #55efc4; color: #000; }
        .btn-leave { background: #ff7675; color: #fff; }
        .btn-exit { background: #636e72; color: #fff; margin-top: 20px; font-size: 12px; width: auto; padding: 5px 15px; }
        input { width: 90%; padding: 10px; border-radius: 5px; border: none; margin: 5px 0; color: #000; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2 id="name">ĐANG TẢI...</h2>
        <p>Điểm: <span id="score">0</span></p>
        <p>Trạng thái: <span id="status">...</span></p>
        <button class="btn-checkin" onclick="checkIn()">BẤM ĐIỂM DANH NHANH</button>
        <input type="text" id="reason" placeholder="Lý do xin nghỉ...">
        <button class="btn-leave" onclick="guidon()">GỬI ĐƠN XIN NGHỈ</button>
        <button class="btn-exit" onclick="window.location.href='index.html'">THOÁT</button>
    </div>
    <script>
        // Lấy ID từ URL (ví dụ student.html?id=HS01)
const layThamSo = new URLSearchParams(window.location.search);
const currentID = layThamSo.get('id');

// Kiểm tra nếu có ID thì mới tải tên
if (currentID) {
    database.ref('users/' + currentID).on('value', (snap) => {
        const data = snap.val();
        if (data) {
            document.getElementById('name').innerText = data.ten;
            document.getElementById('diem-hien-tai').innerText = data.diem_ren_luyen || 0;
            document.getElementById('trang-thai-hien-tai').innerText = data.trang_thai || "...";
        }
    });
}
        var searchParams = new URLSearchParams(window.location.search);
        var idHocSinh = searchParams.get('id');

        if (idHocSinh && typeof database !== 'undefined') {
            database.ref('users/' + idHocSinh).on('value', (snap) => {
                var val = snap.val();
                if(val) {
                    document.getElementById('name').innerText = val.ten;
                    document.getElementById('score').innerText = val.diem_ren_luyen || 0;
                    document.getElementById('status').innerText = val.trang_thai || "Chưa điểm danh";
                }
            });
        }

        function checkIn() {
            if(!idHocSinh) return alert("Thiếu ID!");
            var gio = new Date().getHours();
            var tt = (gio >= 7) ? "Trễ" : "Có mặt";
            database.ref('users/' + idHocSinh).update({
                trang_thai: tt,
                gio_diem_danh: new Date().toLocaleTimeString('vi-VN', { hour12: false })
            }).then(() => alert("Xong!"));
        }

       function guiDon() {
    var lydo = document.getElementById('ly-do-input').value.trim();
    if(!lydo) return alert("Vui lòng nhập lý do!");

    // Sửa chỗ này: Lưu thẳng vào users/ID thay vì tạo mục xin_nghi riêng
    database.ref('users/' + currentID).update({
        ly_do: lydo,
        trang_thai: "Đang chờ duyệt"
    }).then(() => {
        alert("Đã gửi đơn xin nghỉ!");
        document.getElementById('ly-do-input').value = "";
    });
}
    </script>
</body>
</html>
