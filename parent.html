<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phụ Huynh - Smart Attendee</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* CSS y hệt file student bên trên để giữ đồng bộ giao diện cũ */
        body { margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
               background: url('https://static.vinwonders.com/2023/02/kinh-thanh-hue-4.jpg') no-repeat center center fixed; background-size: cover; font-family: sans-serif; }
        .glass-card { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); padding: 40px; border-radius: 25px; 
                      color: white;background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.4)), 
                        var(--url-anh-nen) no-repeat center center fixed; text-align: center; width: 350px; border: 1px solid rgba(85, 239, 196, 0.4); }
        .status-box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin: 20px 0; }
        h2 { color: #55efc4; margin: 0; }
        .btn-exit { background: #636e72; color: #fff; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="glass-card">
        <p style="opacity: 0.7;">GIÁM SÁT HỌC SINH</p>
        <h2 id="p-ten">ĐANG TẢI...</h2>
        
        <div class="status-box">
            <p>Trạng thái: <b id="p-status" style="color: #55efc4;">...</b></p>
            <p>Điểm rèn luyện: <b id="p-diem" style="font-size: 24px;">0</b></p>
        </div>

        <p style="font-size: 12px; opacity: 0.6;">Cập nhật lúc: <span id="p-gio">--:--</span></p>
        <button class="btn-exit" onclick="window.close()">THOÁT</button>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        database.ref('users/' + currentID).on('value', (snap) => {
            const d = snap.val();
            if(d) {
                document.getElementById('p-ten').innerText = d.ten;
                document.getElementById('p-status').innerText = d.trang_thai || "Ngoại tuyến";
                document.getElementById('p-diem').innerText = d.diem_ren_luyen || 0;
                document.getElementById('p-gio').innerText = d.gio_diem_danh || "--";
            }
        });
    </script>
</body>
</html>
