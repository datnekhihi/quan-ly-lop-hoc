<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phụ Huynh - Smart Attendee</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0984e3; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; color: black; padding: 25px; border-radius: 20px; width: 300px; text-align: center; }
        .status-badge { background: #fdcb6e; padding: 10px; border-radius: 10px; display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>GIÁM SÁT HỌC SINH</h3>
        <h2 id="p-ten">...</h2>
        <p>Điểm hiện tại: <b id="p-diem">0</b></p>
        <div class="status-badge">
            Trạng thái: <br><b id="p-status">...</b>
        </div>
        <p style="font-size: 12px; color: gray; margin-top: 20px;">Lần điểm danh cuối: <span id="p-gio">--</span></p>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        database.ref('users/' + currentID).on('value', snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('p-ten').innerText = d.ten;
                document.getElementById('p-diem').innerText = d.diem_ren_luyen;
                document.getElementById('p-status').innerText = d.trang_thai;
                document.getElementById('p-gio').innerText = d.gio_diem_danh || "Chưa có";
            }
        });
    </script>
</body>
</html>
