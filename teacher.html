<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giáo Viên - Smart Attendee Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="/quan-ly-lop-hoc/firebase.config.js"></script>
    <style>
        body { margin: 0; min-height: 100vh; background: url('https://static.vinwonders.com/2023/02/kinh-thanh-hue-4.jpg') no-repeat center center fixed; background-size: cover; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .glass-panel { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; color: white; width: 90%; max-width: 800px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        h2 { color: #55efc4; text-align: center; margin-top: 0; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; min-width: 150px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #55efc4; color: #000; }
        .btn-add:hover { background: #00b894; }
        .btn-exit { background: #636e72; color: #fff; margin-left: auto; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; border-bottom: 2px solid #55efc4; padding: 10px; color: #55efc4; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .tag-present { background: #55efc4; color: #000; }
        .tag-absent { background: #ff7675; color: #fff; }
        
        .action-btn { background: none; border: 1px solid #55efc4; color: #55efc4; padding: 5px 10px; font-size: 12px; margin-right: 5px; }
        .action-btn:hover { background: #55efc4; color: #000; }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div style="display: flex; align-items: center;">
            <h2>QUẢN LÝ LỚP HỌC</h2>
            <button class="btn-exit" onclick="window.location.href='index.html'">THOÁT</button>
        </div>
        
        <div class="input-group">
            <input type="text" id="hs-id" placeholder="Mã HS (ví dụ: HS01)">
            <input type="text" id="hs-ten" placeholder="Họ và tên học sinh">
            <button class="btn-add" onclick="themHocSinh()">TẠO TÀI KHOẢN</button>
        </div>
    </div>

    <div class="glass-panel">
        <h3>DANH SÁCH HỌC SINH</h3>
        <table>
            <thead>
                <tr>
                    <th>Mã số</th>
                    <th>Họ và tên</th>
                    <th>Trạng thái</th>
                    <th>Điểm RL</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="student-list">
                <!-- Dữ liệu sẽ tự động đổ vào đây -->
            </tbody>
        </table>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        // 1. Hàm thêm học sinh mới vào nhánh "users"
        function themHocSinh() {
            const id = document.getElementById('hs-id').value.trim();
            const ten = document.getElementById('hs-ten').value.trim();
            
            if(!id || !ten) return alert("Vui lòng nhập đầy đủ thông tin!");

            database.ref('users/' + id).set({
                ten: ten,
                trang_thai: "Chưa điểm danh",
                diem_ren_luyen: 0,
                gio_diem_danh: "--"
            }).then(() => {
                alert("Đã thêm học sinh " + ten);
                document.getElementById('hs-id').value = "";
                document.getElementById('hs-ten').value = "";
            });
        }

        // 2. Lắng nghe dữ liệu để hiển thị danh sách
        database.ref('users').on('value', (snapshot) => {
            const list = document.getElementById('student-list');
            list.innerHTML = ""; // Xóa danh sách cũ để nạp lại
            
            snapshot.forEach((child) => {
                const id = child.key;
                const data = child.val();
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${id}</b></td>
                    <td>${data.ten}</td>
                    <td>
                        <span class="status-tag ${data.trang_thai === 'Có mặt' ? 'tag-present' : 'tag-absent'}">
                            ${data.trang_thai}
                        </span>
                    </td>
                    <td>${data.diem_ren_luyen || 0}</td>
                    <td>
                        <button class="action-btn" onclick="congDiem('${id}', ${data.diem_ren_luyen || 0})">+ Điểm</button>
                        <button class="action-btn" style="border-color: #ff7675; color: #ff7675;" onclick="xoaHocSinh('${id}')">Xóa</button>
                    </td>
                `;
                list.appendChild(tr);
            });
        });

        // 3. Các hàm bổ trợ
        function congDiem(id, diemHT) {
            database.ref('users/' + id).update({ diem_ren_luyen: diemHT + 1 });
        }

        function xoaHocSinh(id) {
            if(confirm("Bạn có chắc muốn xóa học sinh này?")) {
                database.ref('users/' + id).remove();
            }
        }
    </script>
</body>
</html>
