<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giáo Viên - Smart Attendee</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #2d3436; color: white; font-family: sans-serif; padding: 20px; }
        .box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .card { display: flex; justify-content: space-between; background: #636e72; padding: 10px; margin: 5px 0; border-radius: 8px; }
        .absent-card { border-left: 5px solid #ff7675; background: #4a4a4a; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; }
        button { cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>
    <h2>BẢNG ĐIỀU KHIỂN GIÁO VIÊN</h2>

    <div class="box">
        <h3>Thêm Học Sinh</h3>
        <input type="text" id="new-id" placeholder="ID (VD: HS01)">
        <input type="text" id="new-ten" placeholder="Họ tên">
        <button onclick="addHS()">Tạo mới</button>
    </div>

    <div class="box">
        <h3>Danh Sách Lớp (Nhánh: users)</h3>
        <div id="list-users">Đang tải...</div>
    </div>

    <div class="box">
        <h3>Đơn Xin Nghỉ Mới</h3>
        <div id="list-xin-nghi">Trống</div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        function addHS() {
            const id = document.getElementById('new-id').value;
            const ten = document.getElementById('new-ten').value;
            database.ref('users/' + id).set({ ten: ten, diem_ren_luyen: 100, trang_thai: "Ở lớp" });
        }

        // Hiện danh sách học sinh
        database.ref('users').on('value', snap => {
            const div = document.getElementById('list-users');
            div.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                div.innerHTML += `
                    <div class="card">
                        <span>${d.ten} (ID: ${child.key}) - <b>${d.diem_ren_luyen}đ</b> - ${d.trang_thai}</span>
                        <div>
                            <button onclick="updateDiem('${child.key}', 1)">+</button>
                            <button onclick="updateDiem('${child.key}', -1)">-</button>
                        </div>
                    </div>`;
            });
        });

        // Hiện đơn xin nghỉ
        database.ref('xin_nghi').on('value', snap => {
            const div = document.getElementById('list-xin-nghi');
            div.innerHTML = "";
            if(!snap.exists()) div.innerHTML = "Chưa có đơn nào.";
            snap.forEach(child => {
                const d = child.val();
                div.innerHTML += `
                    <div class="absent-card">
                        <div><b>${d.ten}</b>: ${d.ly_do}</div>
                        <button onclick="daXem('${child.key}')">Xác nhận đã xem</button>
                    </div>`;
            });
        });

        function updateDiem(id, val) {
            database.ref('users/'+id+'/diem_ren_luyen').transaction(c => (c||0) + val);
        }

        function daXem(id) {
            database.ref('xin_nghi/' + id).remove();
            database.ref('users/' + id).update({ trang_thai: "Đã xác nhận nghỉ" });
        }
    </script>
</body>
</html>
