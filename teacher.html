<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giáo Viên - Smart Attendee</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase.config.js"></script>
    <style>
        body { margin: 0; min-height: 100vh; background: url('https://static.vinwonders.com/2023/02/kinh-thanh-hue-4.jpg') no-repeat center center fixed; background-size: cover; font-family: sans-serif; color: white; padding: 20px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .card { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); width: 300px; }
        .list-card { flex: 1; min-width: 400px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 12px; background: #55efc4; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #444; font-size: 14px; }
        .btn-del { background: #ff7675; padding: 5px; font-size: 10px; width: auto; }
        .status-online { color: #55efc4; }
        .status-late { color: #ffeaa7; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h3>QUẢN LÝ LỚP HỌC</h3>
            <input type="text" id="hs_id" placeholder="Mã số (Ví dụ: HS01)">
            <input type="text" id="hs_name" placeholder="Họ và tên">
            <button onclick="themHocSinh()">TẠO TÀI KHOẢN</button>
            <button style="margin-top:10px; background:#636e72; color:#fff" onclick="window.location.href='index.html'">THOÁT</button>
        </div>

        <div class="card list-card">
            <h3>DANH SÁCH HỌC SINH</h3>
            <table>
                <thead>
                    <tr>
                        <th>Mã số</th>
                        <th>Họ và tên</th>
                        <th>Trạng thái</th>
                        <th>Điểm RL</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="student-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Hàm thêm học sinh - Đây là hàm bị thiếu trong ảnh của Đạt
        function themHocSinh() {
            var id = document.getElementById('hs_id').value.trim();
            var ten = document.getElementById('hs_name').value.trim();
            
            if(!id || !ten) return alert("Vui lòng nhập đủ thông tin!");

            database.ref('users/' + id).set({
                ten: ten,
                diem_ren_luyen: 100,
                trang_thai: "Chưa điểm danh"
            }).then(() => {
                alert("Đã thêm học sinh " + ten);
                document.getElementById('hs_id').value = "";
                document.getElementById('hs_name').value = "";
            });
        }

        // Tự động tải danh sách
        database.ref('users').on('value', (snap) => {
            var list = document.getElementById('student-list');
            list.innerHTML = "";
            snap.forEach((child) => {
                var s = child.val();
                var key = child.key;
                if(key.startsWith('HS')) { // Chỉ hiện học sinh
                    var row = `<tr>
                        <td>${key}</td>
                        <td>${s.ten}</td>
                        <td>${s.trang_thai}</td>
                        <td>${s.diem_ren_luyen || 0}</td>
                        <td><button class="btn-del" onclick="xoaHS('${key}')">XÓA</button></td>
                    </tr>`;
                    list.innerHTML += row;
                }
            });
        });

        function xoaHS(id) {
            if(confirm("Xóa học sinh này?")) {
                database.ref('users/' + id).remove();
            }
        }
    </script>
</body>
</html>
