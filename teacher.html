<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giáo Viên - Smart Attendee</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase.config.js"></script>
    <style>
        body { margin: 0; min-height: 100vh; background: url('https://static.vinwonders.com/2023/02/kinh-thanh-hue-4.jpg') no-repeat center center fixed; background-size: cover; font-family: sans-serif; color: white; padding: 20px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .card { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); width: 300px; }
        .list-card { flex: 1; min-width: 400px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-main { width: 100%; background: #55efc4; margin-top: 10px; padding: 12px; color: #000; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #444; font-size: 14px; }
        .btn-del { background: #ff7675; color: white; margin-left: 5px; }
        .btn-plus { background: #55efc4; color: #000; margin-right: 2px; }
        .btn-minus { background: #ffeaa7; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h3>QUẢN LÝ LỚP HỌC</h3>
            <input type="text" id="hs_id" placeholder="Mã số (Ví dụ: HS01)">
            <input type="text" id="hs_name" placeholder="Họ và tên">
            <button class="btn-main" onclick="themHocSinh()">TẠO TÀI KHOẢN</button>
            <button class="btn-main" style="background:#636e72; color:#fff" onclick="window.location.href='index.html'">THOÁT</button>
        </div>

        <div class="card list-card">
            <h3>DANH SÁCH HỌC SINH</h3>
            <table>
                <thead>
                    <tr>
                        <th>Mã số</th>
                        <th>Họ và tên</th>
                        <th>Trạng thái</th>
                        <th>Điểm RL</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="student-list"></tbody>
            </table>
        </div>
    </div>

    <script>
     database.ref('users').on('value', (snap) => {
    var list = document.getElementById('student-list');
    list.innerHTML = "";
    snap.forEach((child) => {
        var s = child.val();
        var key = child.key;
        if(key.startsWith('HS')) { 
            // Hiển thị lý do nếu có đơn chờ duyệt
            var note = s.ly_do ? `<br><small style="color:#ffeaa7">📝 Lý do: ${s.ly_do}</small>` : "";
            var btnDuyet = s.ly_do ? `<button onclick="pheDuyet('${key}')" style="background:#00b894; color:white; margin-right:5px">DUYỆT</button>` : "";

            var row = `<tr>
                <td>${key}</td>
                <td>${s.ten} ${note}</td>
                <td>${s.trang_thai || "---"}</td>
                <td style="font-weight:bold; color:#55efc4">${s.diem_ren_luyen || 0}</td>
                <td>
                    ${btnDuyet}
                    <button class="btn-plus" onclick="changeScore('${key}', 1)">+</button>
                    <button class="btn-minus" onclick="changeScore('${key}', -1)">-</button>
                    <button class="btn-del" onclick="xoaHS('${key}')">Xóa</button>
                </td>
            </tr>`;
            list.innerHTML += row;
        }
    });
});

function pheDuyet(idHS) {
    if(confirm("Xác nhận duyệt đơn cho học sinh này?")) {
        database.ref('users/' + idHS).update({
            trang_thai: "Đã duyệt",
            ly_do: null // Xóa lý do sau khi duyệt xong
        });
    }
}

function changeScore(idHS, amount) {
    const studentRef = database.ref('users/' + idHS + '/diem_ren_luyen');
    studentRef.once('value').then((snapshot) => {
        let currentScore = snapshot.val() || 0;
        studentRef.set(currentScore + amount);
    });
}
    </script>
</body>
</html>
